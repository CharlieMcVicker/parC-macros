stages:
  - final_dropping
  - aspect_suffix
  - tense
  - drop_stem_initial_vowel
  - pronominal
  - distributive
  - trl

# Inflectional Features (originally from verb_features.yaml)
features:
  pronominal:
    - 1sg.A
    - Edl.A
    - Epl.A
    - Idl.A
    - Ipl.A
    - 2sg.A
    - 2dl.A
    - 2pl.A
    - 3sg.A
    - 3ns.A
    - 1sg.B
    - Edl.B
    - Epl.B
    - Idl.B
    - Ipl.B
    - 2sg.B
    - 2dl.B
    - 2pl.B
    - 3sg.B
    - 3ns.B
  aspect:
    - present
    - immediate
    - incompletive
    - completive
    - infinitive
  tense:
    - present
    - immediate
    - habitual
    - future_prog
    - assertive
    - reported
    - infinitive
  translocutive:
    values: [+]
    optional: true
  distributive:
    values: [+]
    optional: true

# Lexical features and metadata (originally from verb.yaml)
lexical_features:
  - prefix_class
  - aspect_class
  - tense_present_class

paradigm:
  generate_contingent_markers: true
