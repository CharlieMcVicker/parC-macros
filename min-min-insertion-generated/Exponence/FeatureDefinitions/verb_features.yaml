# This is a FeatureDefinitions config file
# Generated/Updated automatically from CSV
kind: FeatureDefinitions
features:
  tense:
  - present
  - immediate
  - habitual
  - future_prog
  - assertive
  - reported
  - infinitive
  pronominal:
  - 1sg.A
  - Edl.A
  - Epl.A
  - Idl.A
  - Ipl.A
  - 2sg.A
  - 2dl.A
  - 2pl.A
  - 3sg.A
  - 3ns.A
  - 1sg.B
  - Edl.B
  - Epl.B
  - Idl.B
  - Ipl.B
  - 2sg.B
  - 2dl.B
  - 2pl.B
  - 3sg.B
  - 3ns.B
  - 1sg>3sg
  - 2sg>3sg
  rules:
  - +
  prefix_class:
  - name: a_stem
    acceptor: <Morpheme>*a<Phone>*<Morpheme>*
  - name: cons_stem
    acceptor: <Morpheme>*<C><Phone>*<Morpheme>*
  - name: e_stem
    acceptor: <Morpheme>*e<Phone>*<Morpheme>*
  - name: k_a_stem
    acceptor: <Morpheme>*a<Phone>*<Morpheme>*
  - name: r_stem
    acceptor: <Morpheme>*(<Son>|<N>)<Phone>*<Morpheme>*
  - name: v_stem
    acceptor: <Morpheme>*v<Phone>*<Morpheme>*
  - name: vowel_stem
    acceptor: <Morpheme>*<V><Phone>*<Morpheme>*
  tense_present_class:
  - a_present
  - i_present
